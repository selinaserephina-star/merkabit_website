project: merkabit
version: "2.2"
description: >
  Selina Stenberg's theoretical physics research: a geometry-based unified theory
  of physics deriving the Standard Model, gravity, black holes, and all fundamental
  constants from a single algebraic structure — PSL(2,7) acting on the Eisenstein
  lattice Z[omega]. The Merkabit is a balanced ternary computational unit replacing
  fragile qubits with intrinsically stable dual-spinor geometry. As of May 2026:
  36 published papers + 1 base paper on Zenodo, 5 hardware predictions confirmed
  on IBM Eagle r3 quantum processors, Capstone paper (Paper 30) published April
  2026 presenting the complete unified theory with zero free parameters across 17
  fundamental constants. Co-developed with Claude (Anthropic). Selina is CEO of
  eXOReaction AS; this is her research initiative. This knowledge base covers the
  full paper series, code repositories, theory documents, strategic assessments,
  and implementation pathways.

maintainer: totto@exoreaction.com
updated: "2026-05-11"

