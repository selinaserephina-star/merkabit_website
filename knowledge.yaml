trust:
  provenance:
    publisher: eXOReaction AS / Merkabit
    contact:
      - selina@exoreaction.com
      - totto@exoreaction.com

# ─── AUTHORITY ───────────────────────────────────────────────────────────────
authority:
  read: initiative
  summarize: initiative
  modify: denied
  execute: denied
  share_externally: requires_approval

# ─── VISIBILITY ──────────────────────────────────────────────────────────────
visibility:
  default: public
  conditions:
    - when:
        unit_scope: [strategic, assessment]
      then:
        sensitivity: internal
        requires_auth: true

# ─── DISCOVERY ───────────────────────────────────────────────────────────────
discovery:
  source: manual
  verification_status: verified
  confidence: 1.0
  verified_at: "2026-05-09T00:00:00Z"

# ─── SIGNING ────────────────────────────────────────────────────────────────
signing:
  scheme: ed25519
  scope: this-manifest
  public_key: https://merkabit.com/.well-known/kcp-signing-key.pub
  signature: https://merkabit.com/knowledge.yaml.sig

# ─── PROVIDES SKILLS ────────────────────────────────────────────────────────
provides_skills:
  - merkabit-paper-navigator      # Navigate 35 papers by topic, dependency, status
  - merkabit-hardware-results     # IBM Eagle r3 validation results and analysis
  - merkabit-theory-overview      # Unified theory concepts, PSL(2,7), Eisenstein lattice

# ─── HINTS ───────────────────────────────────────────────────────────────────
hints:
  total_unit_count: 65
  total_token_estimate: 350000
  has_summaries: true
  has_chunks: false
  recommended_entry_point: readme

# ─── NAVIGATION GUIDE ───────────────────────────────────────────────────────
