<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Falsifiability tracker — Merkabit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/site.css"/>
  <style>
    .page-hero { padding: 88px 0 56px; border-bottom: 1px solid var(--line); }
    .key { display: flex; gap: 28px; margin-top: 22px; flex-wrap: wrap; }
    .key span { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mid); display:flex; align-items:center; gap:8px; }
    .key i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .legend-c { background: var(--status-confirmed); }
    .legend-o { background: var(--status-open); }
    .legend-r { background: var(--status-refuted); }
    .filt-bar { display: flex; gap: 8px; margin-top: 22px; }
    .filt-bar button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 8px 14px; background:transparent; border: 1px solid var(--line-strong); color: var(--ink-mid); cursor: pointer; border-radius:999px; }
    .filt-bar button.on { background: var(--gold); color: var(--bg); border-color: var(--gold); }

    .fcard {
      border: 1px solid var(--line); padding: 28px;
      display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: start;
      background: var(--bg-elev-1); position: relative;
      transition: border-color 200ms;
    }
    .fcard:hover { border-color: var(--line-gold); }
    .fcard::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .fcard.s-confirmed::before { background: var(--status-confirmed); }
    .fcard.s-open::before      { background: var(--status-open); }
    .fcard.s-refuted::before   { background: var(--status-refuted); }
    .fcard h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
    .fcard .stmt { color: var(--ink-mid); font-size: 15px; line-height: 1.55; margin: 8px 0 16px; max-width: 70ch; }
    .fcard .meta {
      display: flex; gap: 18px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase;
    }
    .fcard .meta b { color: var(--gold); font-weight: 400; }
    .fcard .right { display:flex; flex-direction: column; align-items: flex-end; gap:10px; min-width: 160px; }
    .fcard .threshold {
      font-family: var(--font-mono); font-size: 12px; color: var(--ink); padding: 6px 10px;
      background: var(--bg-elev-2); border: 1px solid var(--line); white-space: nowrap;
    }
    .grid-stack { display: grid; gap: 14px; }
  </style>
</head>
<body data-nav="science" data-screen-label="05 Falsifiability">
  <div id="site-header"></div>
  <main class="page">
    <section class="page-hero">
      <div class="wrap wrap--wide">
        <div class="crumb"><a href="index.html">Home</a> · <a href="science.html">Science</a> · Falsifiability</div>
        <h1 style="margin-top:18px;">Falsifiability.</h1>
        <p class="lede" style="margin-top:18px;">
          Every prediction the framework makes is exposed at a public, named threshold. If a measurement crosses that threshold, the prediction is refuted. The tracker below is the live status board.
        </p>
        <div class="key">
          <span><i class="legend-c"></i> Confirmed</span>
          <span><i class="legend-o"></i> Open</span>
          <span><i class="legend-r"></i> Refuted</span>
        </div>
        <div class="filt-bar" id="fbar">
          <button class="on" data-k="all">All</button>
          <button data-k="confirmed">Confirmed</button>
          <button data-k="open">Open</button>
          <button data-k="refuted">Refuted</button>
        </div>
      </div>
    </section>

    <section>
      <div class="wrap wrap--wide">
        <div class="grid-stack" id="flist"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="scripts/geometry.js"></script>
  <script src="scripts/chrome.js"></script>
  <script>
    const PRED = [
      {n:1, status:'confirmed', title:'P-gate native to IBM Eagle r3', stmt:'The dual-spinor phase gate is a native operation on the Eagle r3 hardware, not a compiled approximation.', threshold:'Native execution observed', dated:'Mar 2026', tested:'Apr 2026', paper:24},
      {n:2, status:'confirmed', title:'Berry phase quasi-period closes at h(E₆) = 12', stmt:'The Berry phase quasi-period of the Merkabit register closes at the Coxeter number of E₆.', threshold:'Period 12 ± 1', dated:'Feb 2026', tested:'Apr 2026', paper:25},
      {n:3, status:'confirmed', title:'Fano gap at Δ = 1/24', stmt:'A discrete spectral gap appears at the inverse of 24 in the native frequency band, dictated by Fano-plane incidence.', threshold:'Δ = 0.0417 ± 0.005', dated:'Feb 2026', tested:'Apr 2026', paper:25},
      {n:4, status:'confirmed', title:'Two-scale anti-bunching ratio 1 : 1.33', stmt:'Distinct anti-bunching signatures at binary and ternary scales, with ratio 1 : 4/3.', threshold:'Ratio within 5% of 4/3', dated:'Feb 2026', tested:'Apr 2026', paper:24},
      {n:5, status:'confirmed', title:'Z₂ symmetry across the dual-spinor axis', stmt:'The register exhibits exact Z₂ symmetry across the dual-spinor axis under all noise channels.', threshold:'Deviation ≤ 0.5%', dated:'Feb 2026', tested:'Apr 2026', paper:24},
      {n:6, status:'open', title:'Square-grid Willow prediction set', stmt:'On a square-grid topology, the Merkabit predicts a distinct anti-bunching signature absent on heavy-hex.', threshold:'Signature visible at SNR > 3', dated:'Apr 2026', tested:'pending', paper:26},
      {n:7, status:'open', title:'Three fermion generations stable under perturbation', stmt:'The three-generation structure of N₃₆ × W₂₆ orbits is stable under O(α²) perturbation.', threshold:'No fourth orbit at relevant scale', dated:'Apr 2026', tested:'computational', paper:29},
      {n:8, status:'open', title:'Cosmological constant Berry-phase complement', stmt:'The Berry-phase complement to Λ = √(3/2)·exp(−47·78·12/50π) is observable in pulsar-timing arrays.', threshold:'Detection within next NANOGrav release', dated:'Apr 2026', tested:'pending', paper:22},
      {n:9, status:'open', title:'10-Coxeter-period memory persistence under Willow noise', stmt:'The Merkabit content-addressable register persists to 10 Coxeter periods under Willow-realistic noise.', threshold:'Fidelity > 0.9 at t = 120', dated:'Apr 2026', tested:'pending', paper:32},
      {n:10, status:'open', title:'4/3 entanglement threshold universality', stmt:'The 4/3 ratio appears as a structural threshold in any Coulomb-coupled qubit system at cooperative limit.', threshold:'Within 2% of 4/3 across architectures', dated:'Apr 2026', tested:'partial', paper:18},
      {n:11, status:'open', title:'Pentachoric error detection coverage', stmt:'Pentachoric verification detects all single-qubit errors on the dual-spinor register without ancilla.', threshold:'Detection rate ≥ 99.5%', dated:'Apr 2026', tested:'pending', paper:33},
      {n:12, status:'open', title:'Z₃ cyclotomic spectrum in coupled triangles', stmt:'Coupled Merkabit triangles show a cyclotomic Z₃ spectrum distinguishable from binary noise.', threshold:'Spectral peaks at exp(2πi/3)', dated:'May 2026', tested:'pending', paper:34},
    ];
    let active = 'all';
    const bar = document.getElementById('fbar');
    bar.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      active = b.dataset.k;
      [...bar.children].forEach(x => x.classList.toggle('on', x.dataset.k === active));
      render();
    });
    function render() {
      const list = active === 'all' ? PRED : PRED.filter(p => p.status === active);
      document.getElementById('flist').innerHTML = list.map(p => {
        const label = p.status[0].toUpperCase() + p.status.slice(1);
        const cls = p.status === 'confirmed' ? 'pill--confirmed' : (p.status === 'refuted' ? 'pill--refuted' : 'pill--open');
        const sym = p.status === 'confirmed' ? '✓' : (p.status === 'refuted' ? '✕' : '⏳');
        return `
        <div class="fcard s-${p.status}">
          <div>
            <div class="row gap-sm" style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px;">
              <span>Prediction ${String(p.n).padStart(2, '0')}</span>
              <span>·</span>
              <a href="papers.html#p${p.paper}">Paper ${p.paper}</a>
            </div>
            <h3>${p.title}</h3>
            <p class="stmt">${p.stmt}</p>
            <div class="meta">
              <span>Predicted: <b>${p.dated}</b></span>
              <span>Tested: <b>${p.tested}</b></span>
            </div>
          </div>
          <div class="right">
            <span class="pill ${cls}">${sym} ${label}</span>
            <div class="threshold">${p.threshold}</div>
          </div>
        </div>`;
      }).join('');
    }
    render();
  </script>
</body>
</html>
